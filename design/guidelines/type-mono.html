<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--surface); font-family: var(--font-mono); }
  .chip { display:inline-block; background: var(--bg-subtle); border:1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 13px; color: var(--text-body); }
  .label { font-size: 11px; color: var(--text-muted); letter-spacing: .04em; }
</style>
</head>
<body>
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="font-size:15px; color:var(--text-strong);">XP = Base × Difficulty × (1 + streak%) × Deadline</div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <span class="chip">Fn = 100 × n^1.6</span>
      <span class="chip">⚔ 1,240</span>
      <span class="chip">streak: 7d</span>
      <span class="chip">&lt;200ms</span>
    </div>
    <span class="label">JetBrains Mono · 400 · 500 · 700</span>
  </div>
</body>
</html>
