<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="xs 12 → 6xl 60, display + body" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface); }
  table { border-collapse: collapse; width: 100%; }
  td { padding: 5px 0; vertical-align: baseline; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 120px; white-space: nowrap; }
  .sp { font-family: var(--font-display); color: var(--text-strong); line-height: 1.05; font-weight: 600; }
</style>
</head>
<body>
  <table>
    <tr><td class="tok">--text-6xl · 60</td><td><span class="sp" style="font-size:42px;">Boss battle</span></td></tr>
    <tr><td class="tok">--text-4xl · 38</td><td><span class="sp" style="font-size:30px;">Quest log</span></td></tr>
    <tr><td class="tok">--text-2xl · 24</td><td><span class="sp" style="font-size:22px;">Daily stand-up</span></td></tr>
    <tr><td class="tok">--text-lg · 18</td><td><span class="sp" style="font-size:17px; font-weight:500;">Sub-quest title</span></td></tr>
    <tr><td class="tok">--text-base · 16</td><td><span style="font-family:var(--font-body); font-size:16px; color:var(--text-body);">Body copy at sixteen pixels.</span></td></tr>
    <tr><td class="tok">--text-sm · 14</td><td><span style="font-family:var(--font-body); font-size:14px; color:var(--text-body);">Secondary UI label.</span></td></tr>
    <tr><td class="tok">--text-xs · 12</td><td><span style="font-family:var(--font-body); font-size:12px; color:var(--text-muted);">Caption / meta.</span></td></tr>
  </table>
</body>
</html>
