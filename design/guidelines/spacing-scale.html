<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid · --space-1 → --space-24" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px 28px; background:var(--surface); }
  .row { display:flex; align-items:center; gap:12px; margin-bottom:7px; }
  .bar { background:var(--gold-300); height:14px; border-radius:3px; }
  .nm { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); width:150px; }
</style>
</head>
<body>
  <div class="row"><span class="nm">--space-2 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="nm">--space-3 · 12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="nm">--space-4 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="nm">--space-6 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="nm">--space-8 · 32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="nm">--space-12 · 48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="nm">--space-16 · 64</span><span class="bar" style="width:64px"></span></div>
</body>
</html>
