<!-- @dsCard group="Type" viewport="700x210" name="Body — Plus Jakarta Sans" subtitle="UI text, paragraphs, labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--surface); font-family: var(--font-body); }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: .04em; }
  .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <div style="display:flex; flex-direction:column; gap:10px; max-width:560px;">
    <span class="eyebrow">Today's quests</span>
    <p style="font-size:18px; font-weight:600; color:var(--text-strong); margin:0;">Knowledge workers, leveled up.</p>
    <p style="font-size:15px; color:var(--text-body); margin:0; line-height:1.6;">Questify turns your to-do list into an RPG. Complete quests, earn XP and Gold, and dodge the procrastination monsters lurking in your overdue column.</p>
    <p style="font-size:13px; color:var(--text-muted); margin:0;">Secondary caption text · 13px</p>
    <div style="display:flex; gap:24px; margin-top:4px;">
      <span class="label">Plus Jakarta Sans</span>
      <span class="label">400 · 500 · 600 · 700 · 800</span>
    </div>
  </div>
</body>
</html>
