<!-- @dsCard group="Spacing" viewport="700x190" name="Shadows & elevation" subtitle="Warm-cast elevation + chunky 3D button edge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:30px 28px; background:var(--bg-subtle); display:flex; gap:22px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width:84px; height:54px; background:var(--surface-raised); border-radius:var(--radius-md); }
  .nm { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
  .pop { width:96px; height:42px; background:var(--primary); color:var(--on-primary); border:none; border-radius:var(--radius-lg); box-shadow:var(--pop-primary); font-family:var(--font-display); font-weight:600; font-size:14px; }
</style>
</head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="nm">--shadow-xs</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="nm">--shadow-sm</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="nm">--shadow-md</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="nm">--shadow-lg</span></div>
  <div class="col"><button class="pop">Quest!</button><span class="nm">--pop-primary</span></div>
</body>
</html>
